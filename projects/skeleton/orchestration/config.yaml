vaults:
  all: []
  all-optional:
  - psap-forge-notifications
  - psap-forge-mlflow-export
  prepare: []
  prepare-optional: []
  test: []
  test-optional: []

skeleton:
  collect_cluster_info: false
  namespace: skeleton-dev
  properties:
    rate: 1
    data: prompt_tokens=128
    max_requests: 30
  extra_properties: {} # for the preset to give any extra property
  deep_testing: false
  test:
    duration_seconds: 0  # Default test duration in seconds

caliper:
  export:
    from: null
    verbose: true
    dry_run: false
    backend:
      mlflow:
        enabled: true
        secrets:
          vault:
            name: psap-forge-mlflow-export
            mlflow_secret: mlflow-secret.yaml

        config:
          # Same keys/values as docs/caliper/mlflow-config.example.yaml
          experiment: forge-skeleton
          run_name:
          description: >
            Caliper export from FORGE
          source_script: skeleton project
          tags: {}
          parameters: {}
          metrics: {}

  replot:
    url: null  # Set via /replot.url directive
    keep: false  # Set to true to keep download directory after replotting

  postprocess:
    enabled: true
    artifacts_dir: null
    plugin_module: projects.skeleton.postprocess.default.plugin
    postprocess_config: null
    parse:
      enabled: true
      no_cache: false
    visualize:
      enabled: true
      output_dir: null
      reports: [summary_table, throughput_chart]
      report_group: null

    kpi:
      enabled: true
      generate:
        enabled: true
        output: kpis.jsonl
      export:
        enabled: false

    analyze:
      enabled: false
      baseline: null
      output: kpi_analyze.json
