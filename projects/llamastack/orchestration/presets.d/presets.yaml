__multiple: true

smoke:
  experiment.type: lls_overhead
  runtime.selected_preset: smoke
  runtime.user_class: ResponsesSimpleUser
  runtime.users: 10
  runtime.spawn_rate: 10
  runtime.duration_seconds: 30
  runtime.warmup_seconds: 10
  runtime.model_key: qwen3-vl-30b
  llamastack.replicas: 1
  llamastack.disable_otel: true

overhead-simple:
  experiment.type: lls_overhead
  runtime.selected_preset: overhead-simple
  runtime.user_class: ResponsesSimpleUser
  runtime.users: 100
  runtime.spawn_rate: 100
  runtime.duration_seconds: 30
  runtime.warmup_seconds: 30
  runtime.input_tokens: 50
  runtime.output_tokens: 50
  llamastack.disable_otel: true

overhead-sweep:
  experiment.type: lls_overhead
  runtime.selected_preset: overhead-sweep
  runtime.user_class: ResponsesSimpleUser
  runtime.duration_seconds: 300
  runtime.warmup_seconds: 60
  runtime.input_tokens: 50
  runtime.output_tokens: 50
  llamastack.disable_otel: true
  experiment.replica_levels: [1, 2, 4]
  experiment.concurrency_sweep.levels: [1, 2, 4, 8, 16, 32, 64, 128]

test-sweep:
  experiment.type: lls_overhead
  runtime.selected_preset: overhead-sweep
  runtime.user_class: ResponsesSimpleUser
  runtime.duration_seconds: 60
  runtime.warmup_seconds: 30
  runtime.input_tokens: 50
  runtime.output_tokens: 50
  llamastack.disable_otel: true
  experiment.replica_levels: [1, 2]
  experiment.concurrency_sweep.levels: [64, 128]

overhead-4r-128u:
  experiment.type: lls_overhead
  runtime.selected_preset: overhead-4-replicas
  runtime.user_class: ResponsesSimpleUser
  runtime.users: 128
  runtime.spawn_rate: 128
  runtime.duration_seconds: 300
  runtime.warmup_seconds: 60
