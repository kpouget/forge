vaults:
  all: []
  all-optional:
  - psap-forge-notifications
  - psap-forge-mcp-gw-mlflow
  prepare: []
  test: []

metrics:
  enabled: true
  namespaces:
    - mcp-gw-bench
    - mcp-system
    - gateway-system
    - istio-system
  step_seconds: 15
  query_keys: []  # empty = all queries from queries.yaml

caliper:
  postprocess:
    enabled: true
    artifacts_dir: null
    plugin_module: projects.mcp_gateway.postprocess.mcp_gateway.plugin
    postprocess_config: null
    parse:
      enabled: true
      no_cache: false
    visualize:
      enabled: false
    kpi:
      enabled: true
      generate:
        enabled: true
        output: kpis.jsonl
      export:
        enabled: false
    analyze:
      enabled: false
      baseline: null
      output: kpi_analyze.json

  export:
    from: null
    verbose: true
    dry_run: false
    backend:
      mlflow:
        enabled: true
        secrets:
          vault:
            name: psap-forge-mcp-gw-mlflow
            mlflow_secret: mlflow-secret.yaml
            aws_secret: null
        config:
          run_name:
          experiment: mcp-gateway-cpt
          workspace: ashtarkb
          description: >
            MCP Gateway performance test results
          source_script: mcp_gateway project
          tags: {}
          parameters: {}
          metrics: {}
