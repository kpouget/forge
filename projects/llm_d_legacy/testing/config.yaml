vaults:
- psap-forge-notifications
- psap-forge-mlflow-export

project:
    name: null
    args: []
ci_job:
    name: null
    fjob: null
    cluster: null
    exclusive: null
    hardware: null
    owner: null

project:
  name: null
  args: []

ci_presets:
  # name of the presets to apply, or null if no preset
  name: null
  # list of names of the presets to apply, or a single name, or null if no preset
  names: null
  local_config: null
  to_apply: []


clusters:
  cleanup_on_exit: false

security:
  # Run containers as root user (affects both GuideLLM benchmarks and storage download operations)
  run_as_root: false

secrets:
  dir:
    name: psap-ods-secret
    env_key: PSAP_ODS_SECRET_PATH
  rhoai_rc: rhoai_rc.secret
  hf_token: git-credentials

prepare:
  skip: false
  namespace:
    name: llm-d-project

  operators:
    skip: true
    list:
      - name: "Red Hat Connectivity Link"
        catalog: redhat-operators
        operator: rhcl-operator
        namespace: all
        enabled: false

      - name: "OpenShift Cert Manager"
        catalog: redhat-operators
        operator: openshift-cert-manager-operator
        namespace: openshift-cert-manager-operator
        enabled: true

      - name: "Leader Worker Set"
        catalog: redhat-operators
        operator: leader-worker-set
        namespace: openshift-lws
        deploy_cr: true
        enabled: true

      - name: "Node Feature Discovery"
        catalog: redhat-operators
        operator: nfd
        namespace: openshift-nfd
        deploy_cr: 1
        enabled: true

      - name: "NVIDIA GPU Operator"
        catalog: certified-operators
        operator: gpu-operator-certified
        namespace: nvidia-gpu-operator
        deploy_cr: true
        enabled: true

      - name: "Grafana Operator"
        catalog: community-operators
        operator: grafana-operator
        namespace: grafana-operator
        enabled: true
        extra_args:
          all_namespaces: true

  cluster:
    skip: false
    nodes:
      auto_scale: false
      auto_scale_down_on_exit: false
      instance_type: gx3-16x80x1l4
      count: 1

  rhoai:
    skip: false
    image: "quay.io/rhoai/rhoai-fbc-fragment@sha256"
    tag: "17970f248eb3b3df410a5a77da57cc893f0969d549088f76cd50165fa7576937"
    channel: "beta"
    datasciencecluster:
      enable: "[kserve]"
      extra_settings: '{"spec.components.kserve.rawDeploymentServiceConfig": "Headless"}'

  gateway:
    skip: false
    name: openshift-ai-inference  # NOTE: Should not be changed for the time being

  grafana:
    skip: true
    namespace: grafana
    datasources:
      - grafana/datasource.yaml
    dashboards_dir: grafana/dashboards

  monitoring:
    skip: true
    namespaces:
      - "@prepare.namespace.name"

  gpu:
    wait_for_readiness: false

  preload:
    skip: true
    extra_images: {}
    node_selector_key: nvidia.com/gpu.present
    node_selector_value: "true"

  pvc:
    enabled: true
    size: 2000Gi
    name: storage
    access_mode: ReadWriteOnce
    storage_class: null

  model_downloader:
    image: ghcr.io/opendatahub-io/rhaii-on-xks/kserve-storage-initializer:e6b5db0@sha256:b305264fe2211be2c6063500c4c11da79e8357af4b34dd8567b0d8e8dea7e1d4

  cleanup:
    skip: false

deployment_profiles:
  __default__:
    tests.llmd.inference_service.yaml_file: llmisvc-simple.yaml
    tests.llmd.inference_service.epp.deploy: "default"
    tests.llmd.inference_service.epp.config_file: null # use the default config

  simple:
    tests.llmd.inference_service.yaml_file: llmisvc-simple.yaml
    tests.llmd.inference_service.epp.deploy: false

  intelligentrouting:
    tests.llmd.inference_service.yaml_file: llmisvc-simple.yaml

  pd:
    tests.llmd.inference_service.yaml_file: llmisvc-pd.yaml
    tests.llmd.inference_service.epp.deploy: "default"
    tests.llmd.inference_service.epp.config_file: null

models:
  facebook-opt-125m:
    name: facebook/opt-125m
    source: hf://facebook/opt-125m
    resources:
      cpu: 2
      memory: 8Gi

  llama3-1-8b:
    name: RedHatAI/Meta-Llama-3.1-8B-Instruct-FP8-dynamic
    uri: oci://registry.redhat.io/rhelai1/modelcar-llama-3-1-8b-instruct-fp8-dynamic:1.5
    # source: hf://RedHatAI/Meta-Llama-3.1-8B-Instruct-FP8-dynamic
    resources: {}

  llama3-3-70b:
    name: RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic
    source: hf://RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic
    resources:
      cpu: 4
      memory: 64Gi

  gpt-oss-120:
    name: openai/gpt-oss-120b
    source: hf://openai/gpt-oss-120b
    resources:
      cpu: 4
      memory: 64Gi

  granite4-tiny:
    name: RedHatAI/granite-4.0-h-tiny-FP8-dynamic
    source: hf://RedHatAI/granite-4.0-h-tiny-FP8-dynamic
    resources: {}

  gpt-oss-20b:
    name: openai/gpt-oss-20b
    source: hf://openai/gpt-oss-20b

tests:
  llmd:
    skip: false
    skip_prepare: false
    flavors: intelligentrouting
    namespace: "@prepare.namespace.name"

    inference_service:
      skip_deployment: false
      name: llm-d
      yaml_file: null # defined in the deployment_profile
      image_pull_secrets: null

      epp:
        deploy: "default"
        config_file: null # use the default config

      do_simple_test: true
      gateway:
        name: gateway-external
      model: llama3-3-70b
      max_model_len: 40960
      metrics:
        manual_capture: false
        scheduler_servicemonitor_name: kserve-llm-isvc-scheduler
        vllm_podmonitor_name: kserve-llm-isvc-vllm-engine

      # vLLM arguments (always applied)
      vllm_args:
        - "--disable-uvicorn-access-log"
        - "--enable-prefix-caching"
        - "--uvicorn-log-level=debug"
        - "--trust-remote-code"
        - "--gpu-memory-utilization=0.92"

      kueue:
        enabled: false
        prefix: "kueue.x-k8s.io/"
        labels:
          pod-group-name: llmisvc
          managed: "true"
        annotations:
          queue-name: perf-gpu-queue

      # Extra properties to inject into the LLMISVC YAML using dotted-key notation
      extra_properties: {}

    benchmarks:
      guidellm:
        enabled: true
        name: guidellm-benchmark
        load_shape_name: default

        image:
          name: ghcr.io/vllm-project/guidellm
          version: v0.6.0

        rate: 1 # might be iterated, don't pass it in the args

        args:
          backend_type: openai_http
          rate_type: concurrent
          max_seconds: 120
          max_requests: null
          request_type: null
          sample_requests: 20
          data: prompt_tokens=256,output_tokens=128

        extra_args: {}


  capture_prom: true
  capture_prom_uwm: true
  dry_mode: false
  visualize: true

export_artifacts:
  enabled: false

matbench:
  enabled: true
  preset: null
  workload: projects.llm_d_legacy.visualizations.llmd_inference
  config_file: plots.yaml
  # directory to plot
  lts:
    generate: false
    opensearch:
      export:
        enabled: false
        enabled_on_replot: false
        fail_test_on_fail: true
      instance: smoke
      index: topsail-llm-d-cpt
      index_prefix: ""
      build_counter_index: "topsail-llm-d-builds" # used to generate a unique ID for each build
    regression_analyses:
      enabled: false
      enabled_on_replot: true
      upload_lts_on_regression: true
      # if the regression analyses fail, mark the test as failed
      fail_test_on_regression: true
      notification:
        enabled: true
        title: "llm-d CPT"
  download:
    mode: prefer_cache
    url: null

exec_list:
  _only_: false

  pre_cleanup_ci: null
  prepare_ci: null
  test_ci: null
  post_cleanup_ci: null
  matbench_run: true
  generate_plots_from_pr_args: true


caliper:
  export:
    from: null
    verbose: false
    dry_run: false
    backend:
      mlflow:
        enabled: true
        secrets:
          vault:
            name: psap-forge-mlflow-export
            mlflow_secret: mlflow-secret.yaml
            aws_secret: aws.credentials

        config:
          # Same keys/values as docs/caliper/mlflow-config.example.yaml
          experiment: topsail-llmd
          run_name:
          description: >
            Caliper export from FORGE
          source_script: topsail-llmd project
          tags: {}
          parameters: {}
          metrics: {}

  replot:
    url: null  # Set via /replot.url directive
    keep: false  # Set to true to keep download directory after replotting

  postprocess:
    enabled: true
    artifacts_dir: null
    plugin_module: projects.caliper.postprocess.guidellm.plugin
    postprocess_config: null
    parse:
      enabled: true
      no_cache: false
    visualize:
      enabled: true
      output_dir: null
      reports: [benchmark_summary, latency_breakdown]
      report_group: null

    kpi:
      enabled: false
      generate:
        enabled: false
        output: kpis.json
      export:
        enabled: false

    analyze:
      enabled: false
      baseline: null
      output: kpi_analyze.json
