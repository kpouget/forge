# Example visualize groups configuration for GuideLLM analysis
# Place this file in your artifacts directory as "visualize-groups.yaml"
# Use with: caliper visualize --report-group <group_name> --output-dir <output_dir>
#
# Report system:
#   Report 00: GuideLLM Performance Analysis (comprehensive embedded report with all charts)
#   Report 01: GuideLLM KPI Summary (test conditions and key performance indicators)

groups:
  # Comprehensive analysis - all reports including performance analysis and KPI summary (recommended)
  comprehensive:
    - report_performance_analysis
    - report_kpi_summary

  # Performance overview - main performance report only
  overview:
    - report_performance_analysis

  # KPI focus - test conditions and metrics summary only
  kpi:
    - report_kpi_summary

  # All reports - complete set of available reports
  all:
    - report_performance_analysis
    - report_kpi_summary
