vaults:
  all: []
  all-optional:
  - psap-forge-notifications
  - psap-forge-mlflow-export
  - psap-models-corp-rh
  prepare: []
  prepare-optional:
  - psap-forge-hf
  test: []
  test-optional:
  - psap-forge-hf

caliper:
  export:
    from: null
    verbose: true
    dry_run: false
    backend:
      mlflow:
        enabled: true
        secrets:
          vault:
            name: psap-forge-mlflow-export
            mlflow_secret: mlflow-secret.yaml
        config:
          experiment: forge-llm_d
          workspace: forge-llmd
          run_name:
          description: >
            Caliper export from FORGE
          source_script: llm_d project
          tags: {}
          parameters: {}
          metrics: {}

  replot:
    url: null  # Set via /replot.url directive
    keep: false  # Set to true to keep download directory after replotting

  postprocess:
    enabled: true
    artifacts_dir: null
    plugin_module: projects.guidellm.postprocess.guidellm.plugin
    postprocess_config: null
    parse:
      enabled: true
      no_cache: false
    visualize:
      enabled: true
      output_dir: null
      reports: []
      report_group: all
      visualize_config: projects/guidellm/postprocess/guidellm/visualize-groups.yaml

    kpi:
      enabled: true
      generate:
        enabled: true
        output: kpis.jsonl
      export:
        enabled: true

    analyze:
      enabled: false
      baseline: null
      output: kpi_analyze.json

agentic:
  enabled: true
  model_key: qwen-3-6-35b
  on_failure:
    enabled: true
  config_review:
    enabled: true
