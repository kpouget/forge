apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: psap-automation-staging

resources:
  - ../../base

patches:
  - target:
      group: tekton.dev
      version: v1
      kind: Pipeline
    patch: |-
      - op: replace
        path: /metadata/annotations/fournos.dev~1resolve-image
        value: "image-registry.openshift-image-registry.svc:5000/psap-automation-staging/forge-core:latest"

commonLabels:
  environment: staging
